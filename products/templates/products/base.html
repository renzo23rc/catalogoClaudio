{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Catalogo{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="{% url 'products:home' %}" class="nav__brand">Catalogo</a>
            <form class="nav__search" action="{% url 'products:search' %}" method="get">
                <input type="text" name="q" placeholder="Buscar productos..." value="{{ query|default:'' }}">
                <button type="submit">Buscar</button>
            </form>
        </nav>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
