{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Catalogo{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="nav">
        <div class="container nav__inner">
            <a href="{% url 'products:home' %}" class="nav__brand" aria-label="Catalogo - Inicio">
                Catalogo
            </a>

            <form class="nav__search" action="{% url 'products:search' %}" method="get" role="search">
                <input type="text" name="q" placeholder="Buscar productos..." value="{{ query|default:'' }}" aria-label="Buscar productos">
                <button type="submit">Buscar</button>
            </form>

            <div class="nav__actions">
                <a href="/admin/" class="nav__admin-link" title="Panel de Administracion">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <span>Admin</span>
                </a>
            </div>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container footer__inner">
            <div class="footer__copy">
                <span class="footer__brand">Catalogo</span> &copy; {% now "Y" %}. Todos los derechos reservados.
            </div>
            <nav class="footer__links" aria-label="Enlaces del pie">
                <a href="{% url 'products:home' %}">Inicio</a>
                <a href="/admin/" class="footer__admin">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    Admin
                </a>
            </nav>
        </div>
    </footer>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
