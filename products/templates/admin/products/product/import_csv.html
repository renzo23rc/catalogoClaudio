{% extends 'admin/base_site.html' %}
{% block content %}
<h1>Importar productos desde CSV</h1>
<p>El archivo debe tener las columnas: <strong>name, sku, base_price, category_slug</strong> (y opcionalmente: <strong>slug, description, stock_quantity</strong>)</p>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="default">Importar</button>
</form>
<a href="../">Volver</a>
{% endblock %}
