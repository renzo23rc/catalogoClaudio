{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Catalogo{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="nav">
        <div class="container nav__inner">
            <a href="{% url 'products:home' %}" class="nav__brand">Catalogo</a>
            <form class="nav__search" action="{% url 'products:search' %}" method="get">
                <input type="text" name="q" placeholder="Buscar productos..." value="{{ query|default:'' }}" aria-label="Buscar productos">
                <button type="submit">Buscar</button>
            </form>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; {% now "Y" %} Catalogo. Todos los derechos reservados.</p>
        </div>
    </footer>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
